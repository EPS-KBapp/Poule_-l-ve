.mteams{display:flex;align-items:center;padding:.45rem .6rem;gap:.3rem;background:#fff}
.match.done .mteams{background:#f5fbf6}
.tname{flex:1;font-weight:700;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tname.r{text-align:right}
.tvs{font-weight:900;color:#aaa;padding:0 .3rem;flex-shrink:0;font-size:.82rem}
.tscore{font-weight:900;color:#c85a00;padding:0 .2rem;flex-shrink:0;font-size:.95rem}
.dbadge{font-size:.58rem;background:#1a7a30;color:#fff;padding:.1rem .35rem;border-radius:3px;margin-left:auto;flex-shrink:0}
.scores{display:flex;background:#f8f9fb;border-top:1px solid #eaecf0}
.sw{flex:1;display:flex;flex-direction:column;align-items:center;padding:.4rem .2rem .35rem;gap:.15rem}
.sw:first-child{border-right:1px solid #eaecf0}
.slbl{font-size:.56rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#999;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.sbtns{display:flex;align-items:center;gap:.4rem}
.sbtn{width:38px;height:38px;border:2px solid #c5c9d4;border-radius:8px;background:#fff;font-size:1.25rem;font-weight:900;cursor:pointer;color:#1a2035;line-height:1;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;user-select:none}
.sbtn:active,.sbtn:focus{background:#c85a00;color:#fff;border-color:#c85a00;outline:none}
.sval{font-size:1.6rem;font-weight:900;color:#c85a00;min-width:2.2rem;text-align:center;line-height:1}
.btn{display:block;width:100%;padding:.7rem;border:none;border-radius:8px;font-family:Verdana,Arial,sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;margin-bottom:.4rem;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.bp{background:#c85a00;color:#fff}
.bp:active{background:#a84800}
.bg{background:#fff;color:#333;border:2px solid #c5c9d4}
.info{font-size:.72rem;color:#888;margin-bottom:.55rem;line-height:1.6}
#qr-out{text-align:center;margin-top:.75rem}
#qr-out canvas{border:3px solid #c5c9d4;border-radius:8px;max-width:220px;width:100%;display:block;margin:0 auto}
.cbox{margin-top:.5rem;background:#1a2035;color:#7df;font-family:monospace;font-size:.63rem;padding:.5rem .55rem;border-radius:6px;word-break:break-all;cursor:pointer;text-align:left;line-height:1.5;border:none;width:100%;-webkit-tap-highlight-color:transparent}
.cbox.copied{background:#155a1a}
.hint{font-size:.62rem;color:#888;margin-top:.25rem;line-height:1.5;text-align:center}
textarea{width:100%;font-family:monospace;font-size:.68rem;border:2px solid #c5c9d4;border-radius:6px;padding:.4rem;outline:none;resize:vertical;margin-top:.35rem}
</style>


<header>
  <div class="logo">Multi <span>Tournoi</span></div>
  <span class="badge" id="pb">Poule __POOL_NAME__</span>
</header>
<main>
  <div class="card" id="main-card">
    <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <h2 id="ptitle">🏓 Chargement…</h2>
    <div id="ml"></div>
  </div>
  <div class="card" id="sc" style="display:none">
    <h2>📤 Envoyer les résultats</h2>
    <p class="info">Tous les matchs sont terminés ! Générez le QR code et faites-le scanner par votre professeur, ou copiez le code.</p>
    <button class="btn bp" onclick="genQr()">🎯 Générer QR &amp; code résultats</button>
    <div id="qr-out"></div>
  </div>
</main>
<script>
var D=null,SC={};
var DATA_B64='';

function loadData(b64){
  try{ D=JSON.parse(decodeURIComponent(escape(atob(b64)))); }
  catch(e){ document.getElementById('ml').innerHTML='<p style="color:red;padding:.5rem">Données invalides : '+e.message+'</p>'; return; }
  document.getElementById('pb').textContent=D.n;
  document.getElementById('ptitle').textContent='🏓 Matchs de la poule';
  document.title='Poule '+D.n;
  D.m.forEach(function(m,i){ SC[i]={s1:m.d?m.s:0,s2:m.d?m.u:0,done:!!m.d}; });
  render();
}

function render(){
  var tot=D.m.length,done=0;
  Object.keys(SC).forEach(function(i){ if(SC[i].done)done++; });
  document.getElementById('pf').style.width=Math.round(done/tot*100)+'%';
  var html='',rds={};
  D.m.forEach(function(m,i){ var r=m.r||0; if(!rds[r])rds[r]=[]; rds[r].push(i); });
  var si=0;
  Object.keys(rds).sort(function(a,b){return+a-+b;}).forEach(function(r){
    si++;
    html+='<div class="stag">Session '+si+'</div>';
    rds[r].forEach(function(i){
      var m=D.m[i],sc=SC[i],ok=sc.done;
      var w1=ok&&sc.s1>sc.s2,w2=ok&&sc.s2>sc.s1;
      html+='<div class="match'+(ok?' done':'')+'">'+
        '<div class="mteams">'+
          '<span class="tname r"'+(w1?' style="color:#1a7a30"':'')+'>'+escH(m.a)+'</span>'+
          (ok?'<span class="tscore">'+sc.s1+' – '+sc.s2+'</span>':'<span class="tvs">VS</span>')+
          '<span class="tname"'+(w2?' style="color:#1a7a30"':'')+'>'+escH(m.b)+'</span>'+
          (ok?'<span class="dbadge">✓</span>':'')+
        '</div>'+
        '<div class="scores">'+
          '<div class="sw">'+
            '<div class="slbl">'+escH(m.a)+'</div>'+
            '<div class="sbtns">'+
              '<button class="sbtn" onclick="adj('+i+',-1,1)" aria-label="Moins">−</button>'+
              '<span class="sval" id="s1-'+i+'">'+sc.s1+'</span>'+
              '<button class="sbtn" onclick="adj('+i+',1,1)" aria-label="Plus">+</button>'+
            '</div>'+
          '</div>'+
          '<div class="sw">'+
            '<div class="slbl">'+escH(m.b)+'</div>'+
            '<div class="sbtns">'+
              '<button class="sbtn" onclick="adj('+i+',-1,2)" aria-label="Moins">−</button>'+
              '<span class="sval" id="s2-'+i+'">'+sc.s2+'</span>'+
              '<button class="sbtn" onclick="adj('+i+',1,2)" aria-label="Plus">+</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
      '</div>';
    });
  });
  document.getElementById('ml').innerHTML=html;
  document.getElementById('sc').style.display=(done===tot&&tot>0)?'':'none';
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function adj(mi,delta,team){
  var sc=SC[mi];
  if(team===1) sc.s1=Math.max(0,sc.s1+delta);
  else sc.s2=Math.max(0,sc.s2+delta);
  sc.done=true;
  document.getElementById('s1-'+mi).textContent=sc.s1;
  document.getElementById('s2-'+mi).textContent=sc.s2;
  render();
}

function genQr(){
  var res=[];
  Object.keys(SC).forEach(function(i){
    var sc=SC[i]; if(sc.done) res.push({i:+i,a:sc.s1,b:sc.s2});
  });
  var b64=btoa(unescape(encodeURIComponent(JSON.stringify({n:D.n,r:res}))));
  var out=document.getElementById('qr-out');
  out.innerHTML=
    '<canvas id="qce" style="margin-bottom:.4rem"></canvas>'+
    '<button class="cbox" id="cbox-btn" onclick="copyCode()">'+b64+'</button>'+
    '<div class="hint">👆 Appuyez sur le code pour copier<br>puis collez-le dans l\'application du professeur</div>';
  try{
    var segs=qrcodegen.QrSegment.makeSegments(b64);
    var qr=qrcodegen.QrCode.encodeSegments(segs,qrcodegen.QrCode.Ecc.MEDIUM,1,40,-1,true);
    var sz=qr.size,sc2=Math.max(2,Math.floor(220/sz));
    var c=document.getElementById('qce');
    c.width=sz*sc2+8; c.height=sz*sc2+8;
    var ctx=c.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#000';
    for(var y=0;y<sz;y++) for(var x=0;x<sz;x++)
      if(qr.getModule(x,y)) ctx.fillRect(4+x*sc2,4+y*sc2,sc2,sc2);
  }catch(e){ document.getElementById('qce').style.display='none'; }
}

function copyCode(){
  var btn=document.getElementById('cbox-btn');
  var txt=btn.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){
      btn.classList.add('copied');
      btn.textContent='✓ Copié !';
      setTimeout(function(){ btn.classList.remove('copied'); btn.textContent=txt; },1800);
    });
  } else {
    var ta=document.createElement('textarea');
    ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.classList.add('copied'); btn.textContent='✓ Copié !';
    setTimeout(function(){ btn.classList.remove('copied'); btn.textContent=txt; },1800);
  }
}

// Charger depuis le hash URL ou depuis la constante embarquée
var hash=location.hash.slice(1);
if(hash){ loadData(hash); }
else if(DATA_B64 && DATA_B64!=='__B64_DATA__'){ loadData(DATA_B64); }
else{ showLoadUI(); }

function showLoadUI(){
  document.getElementById('ptitle').textContent='⚠️ Chargement requis';
  var div=document.createElement('div');

  var p=document.createElement('p');
  p.style.cssText='font-size:.76rem;color:#888;margin-bottom:.5rem;line-height:1.55';
  p.textContent='Scannez le QR du professeur ou entrez le code :';
  div.appendChild(p);

  var inp=document.createElement('input');
  inp.id='bid-in'; inp.type='text';
  inp.placeholder='Code poule (ex: abc123...)';
  inp.style.cssText='width:100%;padding:.4rem .5rem;font-family:monospace;font-size:.82rem;border:2px solid #c5c9d4;border-radius:6px;outline:none;margin-bottom:.35rem';
  div.appendChild(inp);

  var btn1=document.createElement('button');
  btn1.className='btn bp'; btn1.style.cssText='margin-bottom:.5rem';
  btn1.textContent='🌐 Charger depuis internet';
  btn1.onclick=loadFromBid;
  div.appendChild(btn1);

  var sep=document.createElement('div');
  sep.style.cssText='text-align:center;font-size:.68rem;color:#999;margin:.35rem 0';
  sep.textContent='— ou collez les données —';
  div.appendChild(sep);

  var ta=document.createElement('textarea');
  ta.id='pt'; ta.rows=2;
  ta.placeholder='Données complètes...';
  ta.style.cssText='width:100%;font-family:monospace;font-size:.65rem;border:2px solid #c5c9d4;border-radius:4px;padding:.3rem;margin-bottom:.3rem';
  div.appendChild(ta);

  var btn2=document.createElement('button');
  btn2.className='btn bg'; btn2.textContent='✓ Charger';
  btn2.onclick=loadFromPaste;
  div.appendChild(btn2);

  document.getElementById('ml').appendChild(div);
}

function loadFromBid(){
  var v=document.getElementById('bid-in');
  if(!v||!v.value.trim())return;
  var bid=v.value.trim().split('/').pop();
  v.disabled=true; v.value='Chargement...';
  fetch('https://jsonblob.com/api/jsonBlob/'+bid)
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){loadData(d.data);})
    .catch(function(e){v.disabled=false;v.value='';v.placeholder='❌ '+e.message;});
}

function loadFromPaste(){
  var v=document.getElementById('pt');
  if(v&&v.value.trim())loadData(v.value.trim());
}
</script>
